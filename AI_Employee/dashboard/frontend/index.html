<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Employee Vault - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Welcome Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 card-hover transition-all duration-300">
            <!-- Logo/Icon -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-full mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">AI Employee Vault</h1>
                <p class="text-gray-500">Automation Control Center</p>
            </div>

            <!-- Description -->
            <div class="mb-8 text-center">
                <p class="text-gray-600 mb-2">Manage your automation system from one place</p>
                <div class="flex justify-center gap-4 text-sm text-gray-500">
                    <span class="flex items-center">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                        Watchers
                    </span>
                    <span class="flex items-center">
                        <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                        Social Media
                    </span>
                    <span class="flex items-center">
                        <span class="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>
                        AI Tools
                    </span>
                </div>
            </div>

            <!-- Enter Dashboard Button -->
            <a href="dashboard.html" class="block w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-4 px-6 rounded-xl text-center hover:from-purple-700 hover:to-indigo-700 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                <span class="flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                    Open Dashboard
                </span>
            </a>

            <!-- API Status -->
            <div class="mt-6 pt-6 border-t border-gray-200">
                <div class="flex items-center justify-center text-sm text-gray-500">
                    <span class="w-2 h-2 bg-gray-400 rounded-full mr-2 status-dot"></span>
                    <span id="api-status">Checking API...</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white text-opacity-75 text-sm mt-6">
            AI Employee Vault v1.0.0
        </p>
    </div>

    <script>
        // Check API health on load
        async function checkApiStatus() {
            const statusDot = document.querySelector('.status-dot');
            const statusText = document.getElementById('api-status');
            
            try {
                const response = await fetch('http://localhost:8000/api/health');
                if (response.ok) {
                    statusDot.classList.remove('bg-gray-400');
                    statusDot.classList.add('bg-green-500');
                    statusText.textContent = 'API Connected';
                }
            } catch (error) {
                statusDot.classList.remove('bg-gray-400');
                statusDot.classList.add('bg-red-500');
                statusText.textContent = 'API Offline';
            }
        }
        
        checkApiStatus();
    </script>
</body>
</html>
